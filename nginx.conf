events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    # Upstream to the pitch service
    upstream pitch_service {
        server pitch:80;
    }

    server {
        listen 80;
        server_name pitch.targetly.ru;

        # Allow certbot ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name pitch.targetly.ru;

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/pitch.targetly.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pitch.targetly.ru/privkey.pem;

        # Recommended SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://pitch_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
